<div class="feature-container">
  <header class="list-header">
    <h1>Explore Recipes</h1>
    
    <div class="filter-panel">
      <div class="filter-group">
        <label>Search by Title</label>
        <input 
          type="text" 
          [(ngModel)]="searchTitle" 
          placeholder="e.g. Pasta..."
          class="form-input"
        >
      </div>

      <div class="filter-group">
        <label>Ingredients (AND Search)</label>
        <app-ingredient-search 
          (onSelectionChange)="onIngredientsChanged($event)" 
        />
      </div>

      <div class="filter-actions">
        <button class="btn-primary" (click)="loadRecipes()" [disabled]="isLoading()">
          {{ isLoading() ? 'Searching...' : 'Find Recipes' }}
        </button>
        <button class="btn-text" (click)="onReset()">Reset</button>
      </div>
    </div>
  </header>

  <hr class="divider">

  @if (errorMessage()) {
    <div class="error-alert">
      {{ errorMessage() }}
    </div>
  }

  @if (isLoading()) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Sharpening the knives...</p>
    </div>
  } @else {
    <div class="recipe-grid">
      @for (recipe of recipes(); track recipe.id) {
        <app-recipe-card [recipe]="recipe" />
      } @empty {
        <div class="empty-state">
          <p>No recipes found matching your criteria.</p>
          <button class="btn-secondary" (click)="onReset()">Show all recipes</button>
        </div>
      }
    </div>
  }
</div>
